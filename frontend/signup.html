<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SyncForge Sign Up</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="loginContainer">

  <div class="loginCard">

    <h2 class="logo">SYNCFORGE</h2>

    <h1>Create Account</h1>
    <p class="subtitle">Sign up to start managing your tasks</p>

    <label>Email</label>
    <input id="email" placeholder="you@example.com">

    <label>Password</label>
    <input id="password" type="password" placeholder="••••••••">

    <button id="signupBtn" class="primaryBtn">
      Sign Up
    </button>

    <button onclick="window.location.href='login.html'" class="signupBtn">
      Back to Login
    </button>

    <p id="error"></p>

  </div>

</div>

<script src="signup.js"></script>

</body>
</html>
